services:
  - type: web
    name: puppy
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_SECRET_TOKEN
        sync: false
      - key: ALLOWED_TELEGRAM_USER_IDS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SETU_CLIENT_ID
        sync: false
      - key: SETU_CLIENT_SECRET
        sync: false
      - key: SETU_PRODUCT_INSTANCE_ID
        sync: false
